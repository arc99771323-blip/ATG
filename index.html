<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Gestão de Vasilhame</title>
    <style>
        :root {
            --primary: #475569;
            --accent: #3b82f6;
            --success: #10b981;
            --bg: #f8fafc;
            --border-uniform: #94a3b8;
            --text: #334155;
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }
        
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
            background-color: var(--bg); 
            color: var(--text);
            margin: 0; padding: 20px;
        }

        /* PAINEL DE CONTROLE */
        .no-print { 
            max-width: 1000px;
            margin: 0 auto 40px auto;
            background: white; 
            padding: 30px; 
            border-radius: 16px; 
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); 
            border: 1px solid var(--border-uniform);
            text-align: center;
        }

        .no-print h1 { font-size: 24px; margin-top: 0; color: var(--primary); }

        input[type="file"] {
            padding: 10px;
            background: #f1f5f9;
            border-radius: 8px;
            border: 2px dashed var(--border-uniform);
            width: 100%;
            margin-bottom: 20px;
            cursor: pointer;
        }

        #lista-filtros {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 10px;
            margin: 20px 0;
            padding: 15px;
            background: #f8fafc;
            border-radius: 12px;
        }

        .btn-mapa {
            padding: 10px;
            background: white;
            border: 1px solid var(--border-uniform);
            color: var(--text);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-mapa.ativo { background: var(--accent); color: white; border-color: var(--accent); }

        .acoes-globais { display: flex; justify-content: center; gap: 10px; margin-top: 20px; border-top: 1px solid var(--border-uniform); padding-top: 20px; }

        .btn {
            padding: 12px 24px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            text-transform: uppercase;
        }

        .btn-print { background: var(--primary); color: white; }
        .btn-all { background: var(--success); color: white; }
        .btn-clear { background: #f1f5f9; color: var(--text); border: 1px solid var(--border-uniform); }

        /* ESTILO DO RELATÓRIO */
        .mapa-pagina { 
            background: white; 
            width: 210mm; 
            margin: 0 auto 50px auto; 
            padding: 15mm; 
            border: 1px solid var(--border-uniform);
            box-shadow: 0 0 20px rgba(0,0,0,0.05); /* Sombra apenas para tela */
            display: none;
        }

        .mapa-pagina.visivel { display: block; }

        .report-header {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-uniform);
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .report-header div span { display: block; font-size: 11px; color: #64748b; text-transform: uppercase; }
        .report-header div strong { font-size: 16px; color: var(--primary); }

        .report-title {
            text-align: center;
            font-weight: 700;
            font-size: 20px;
            margin-bottom: 30px;
            color: var(--primary);
            text-transform: uppercase;
        }

        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        
        th { 
            border: 1px solid var(--border-uniform);
            background: #f1f5f9;
            padding: 12px;
            font-size: 11px;
            color: var(--primary);
            text-align: left;
        }

        td { 
            border: 1px solid var(--border-uniform); 
            padding: 14px 12px; 
            font-size: 14px; 
            color: var(--text);
        }

        .cod-col { width: 90px; text-align: center; }
        .qtd-col { 
            width: 130px;
            text-align: center; 
            background-color: #fef9c3 !important;
            font-weight: 800; 
            font-size: 26px; 
            border: 1px solid var(--border-uniform) !important;
        }

        /* REMOÇÃO DE SOMBRAS E AJUSTES DE IMPRESSÃO */
        @media print {
            body { background: white !important; padding: 0 !important; margin: 0 !important; }
            .no-print { display: none !important; }
            
            .mapa-pagina.visivel { 
                display: block !important;
                margin: 0 !important; 
                padding: 10mm !important;
                width: 100% !important; 
                border: none !important; /* Remove borda externa na impressão */
                box-shadow: none !important; /* REMOVE A SOMBRA COMPLETAMENTE */
                page-break-after: always !important;
                transform: none !important;
            }

            /* Garante que as bordas da tabela continuem visíveis em cinza */
            table, th, td { border: 1px solid var(--border-uniform) !important; }
            
            @page { size: A4; margin: 0; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; box-shadow: none !important; }
        }
    </style>
</head>
<body>

<div class="no-print">
    <h1>📦 Gestor de Retorno de Vasilhame</h1>
    <input type="file" id="inputCsv" accept=".csv,.txt">

    <div id="area-filtros" style="display:none;">
        <p style="font-weight: 600; color: #64748b;">Mapas identificados:</p>
        <div id="lista-filtros"></div>
        <div class="acoes-globais">
            <button class="btn btn-all" onclick="selecionarTodos(true)">Selecionar Todos</button>
            <button class="btn btn-clear" onclick="selecionarTodos(false)">Limpar Tudo</button>
            <button class="btn btn-print" onclick="window.print()">Gerar PDF / Imprimir</button>
        </div>
    </div>
</div>

<div id="conteudo"></div>

<script>
document.getElementById('inputCsv').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(evt) { processarArquivo(evt.target.result); };
    reader.readAsText(file, 'ISO-8859-1');
});

const ITENS_MONITORADOS = [
    { cod: "863059", nome: "GARRAFEIRA 23" },
    { cod: "198214", nome: "GFA VIDRO 330 M" },
    { cod: "188005", nome: "GFE 1L 12" },
    { cod: "188006", nome: "GFA VD 1L" },
    { cod: "899599", nome: "GFE PRETA" },
    { cod: "27983",  nome: "GFA A CERV 1/1" },
    { cod: "786238", nome: "GFA VIDRO 635ML" },
    { cod: "893605", nome: "GARRAFA CORONA" },
    { cod: "101489", nome: "BARRIL 30 L" },
    { cod: "101490", nome: "BARRIL 50 L" },
    { cod: "42069",  nome: "PALETE PBR II" },
    { cod: "37108",  nome: "CHAPATEX" }
];

function processarArquivo(texto) {
    const output = document.getElementById('conteudo');
    const filtroArea = document.getElementById('area-filtros');
    const listaFiltros = document.getElementById('lista-filtros');
    
    output.innerHTML = '';
    listaFiltros.innerHTML = '';

    const blocosMapas = texto.split(/(?=Mapa:\s*\d+)/g);

    blocosMapas.forEach((bloco, idx) => {
        if (!bloco.includes("Mapa:")) return;
        
        const m = bloco.match(/Mapa:\s*([\d.]+)/);
        const p = bloco.match(/Placa:\s*([A-Z0-9-]+)/);
        const d = bloco.match(/Data emissao:\s*(\d{2}\/\d{2}\/\d{4})/);
        
        let mapaID = m?.[1] || idx;
        let totais = {};
        let linhasProcessadas = new Set(); 

        const linhas = bloco.split('\n');
        linhas.forEach((linha, i) => {
            ITENS_MONITORADOS.forEach(item => {
                const regex = new RegExp(item.cod + "\\s+(?:un|pc)\\s+" + item.nome.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + "\\s+(\\d+)", "i");
                const match = linha.match(regex);
                if (match) {
                    const qtd = parseInt(match[1]);
                    const chave = `${i}-${item.cod}-${qtd}`;
                    if (!linhasProcessadas.has(chave)) {
                        totais[item.cod] = (totais[item.cod] || 0) + qtd;
                        linhasProcessadas.add(chave);
                    }
                }
            });
        });

        if (Object.keys(totais).length > 0) {
            renderizarMapa(mapaID, { id: mapaID, placa: p?.[1] || "---", data: d?.[1] || "---" }, totais);
            criarBotaoFiltro(mapaID);
        }
    });
    filtroArea.style.display = 'block';
}

function criarBotaoFiltro(id) {
    const btn = document.createElement('button');
    btn.className = 'btn-mapa';
    btn.id = 'btn-' + id;
    btn.innerText = id;
    btn.onclick = () => alternarMapa(id);
    document.getElementById('lista-filtros').appendChild(btn);
}

function alternarMapa(id) {
    document.getElementById('mapa-' + id).classList.toggle('visivel');
    document.getElementById('btn-' + id).classList.toggle('ativo');
}

function selecionarTodos(status) {
    document.querySelectorAll('.mapa-pagina').forEach(m => status ? m.classList.add('visivel') : m.classList.remove('visivel'));
    document.querySelectorAll('.btn-mapa').forEach(b => status ? b.classList.add('ativo') : b.classList.remove('ativo'));
}

function renderizarMapa(id, dados, totais) {
    const div = document.createElement('div');
    div.className = 'mapa-pagina';
    div.id = 'mapa-' + id;
    
    let tabelaLinhas = "";
    ITENS_MONITORADOS.forEach(item => {
        if (totais[item.cod] !== undefined) {
            tabelaLinhas += `<tr><td class="cod-col">${item.cod}</td><td style="font-weight:600">${item.nome}</td><td class="qtd-col">${totais[item.cod]}</td></tr>`;
        }
    });

    div.innerHTML = `
        <div class="report-header">
            <div><span>Mapa de Carga</span><strong>${dados.id}</strong></div>
            <div style="text-align:center"><span>Veículo</span><strong>${dados.placa}</strong></div>
            <div style="text-align:right"><span>Data Emissão</span><strong>${dados.data}</strong></div>
        </div>
        <div class="report-title">Resumo de Vasilhame</div>
        <table>
            <thead><tr><th style="text-align:center">Código</th><th>Descrição do Produto</th><th style="text-align:center">Quantidade</th></tr></thead>
            <tbody>${tabelaLinhas}</tbody>
        </table>
    `;
    document.getElementById('conteudo').appendChild(div);
}
</script>

</body>
</html>
